# ===================================================================
# bandwidth_limit.conf - Pembatasan Bandwidth via Delay Pools
# Lokasi: Merge ke /etc/squid/squid.conf atau include dari sana
# ===================================================================

# -------------------------------------------------------------------
# KONSEP DELAY POOLS
# -------------------------------------------------------------------
# Delay Pools membatasi kecepatan transfer data per-bucket.
# Tipe pool:
#   1 = aggregate (semua traffic digabung)
#   2 = aggregate + individual per-host
#   3 = aggregate + network + individual

# -------------------------------------------------------------------
# CONTOH 1: Batasi semua client max 2 Mbps download
# -------------------------------------------------------------------
# Aktifkan delay pools
delay_pools 1
delay_class 1 1

# Format: delay_parameters <pool> <aggregate>
# Nilai: bytes/detik (-1 = tidak terbatas)
# 2 Mbps = 262144 bytes/detik (2*1024*1024/8)
# Bucket: max-burst/restore-rate
delay_parameters 1 262144/262144

# Terapkan ke semua traffic yang diizinkan
delay_access 1 allow all

# -------------------------------------------------------------------
# CONTOH 2: Batasi per-host dan per-jaringan (aktifkan jika perlu)
# -------------------------------------------------------------------
# Nonaktifkan contoh 1 dulu sebelum menggunakan ini

# delay_pools 2
# 
# # Pool 1: Untuk semua user (1 Mbps aggregate)
# delay_class 1 2
# delay_parameters 1 131072/131072  131072/131072
# delay_access 1 allow localnet
# 
# # Pool 2: Untuk download file besar (filter by URL)
# delay_class 2 1
# acl download_files urlpath_regex -i \.iso$ \.exe$ \.zip$ \.rar$ \.mp4$ \.mkv$
# delay_parameters 2 65536/65536  # 512 Kbps
# delay_access 2 allow download_files

# -------------------------------------------------------------------
# CONTOH 3: Pengecualian (jangan di-throttle)
# -------------------------------------------------------------------
# acl unlimited_hosts src 172.24.0.1/32   # Server tetap unlimited
# delay_access 1 deny unlimited_hosts
# delay_access 1 allow all

# -------------------------------------------------------------------
# REFERENSI KONVERSI KECEPATAN
# -------------------------------------------------------------------
# 512 Kbps = 65536  bytes/detik
# 1   Mbps = 131072 bytes/detik
# 2   Mbps = 262144 bytes/detik
# 5   Mbps = 655360 bytes/detik
# 10  Mbps = 1310720 bytes/detik
# -1       = tidak ada batas (unlimited)
# ===================================================================
