# ===================================================================
# Squid Proxy Server - Enterprise Configuration Template
# Target Location: /etc/squid/squid.conf
# Features: Access Control, Safe Ports, Local Network Routing
# ===================================================================

# -------------------------------------------------------------------
# NETWORK PARAMETERS
# -------------------------------------------------------------------
# Standard proxy port
http_port 3128

# -------------------------------------------------------------------
# ACCESS CONTROL LISTS (ACL)
# -------------------------------------------------------------------
# Define internal networks
acl localnet src 10.0.0.0/8       # RFC1918 internal network
acl localnet src 172.16.0.0/12    # RFC1918 internal network
acl localnet src 192.168.0.0/16   # RFC1918 internal network
acl localhost src 127.0.0.1/32

# Define safe ports
acl SSL_ports port 443
acl Safe_ports port 80            # http
acl Safe_ports port 21            # ftp
acl Safe_ports port 443           # https
acl Safe_ports port 70            # gopher
acl Safe_ports port 210           # wais
acl Safe_ports port 1025-65535    # unregistered ports
acl Safe_ports port 280           # http-mgmt
acl Safe_ports port 488           # gss-http
acl Safe_ports port 591           # filemaker
acl Safe_ports port 777           # multiling http

# -------------------------------------------------------------------
# HTTP ACCESS RULES
# -------------------------------------------------------------------
# 1. Deny requests to unsafe ports
http_access deny !Safe_ports

# 2. Deny CONNECT to other than secure SSL ports
http_access deny CONNECT !SSL_ports

# 3. Only allow cachemgr access from localhost
http_access allow localhost manager
http_access deny manager

# 4. Allow access from your local networks
http_access allow localnet
http_access allow localhost

# 5. AND finally deny all other access to this proxy
http_access deny all

# -------------------------------------------------------------------
# LOGGING & PERFORMANCE
# -------------------------------------------------------------------
# Recommended: Leave coredumps in the first cache dir
coredump_dir /var/spool/squid

# Log formats and paths (Standard)
access_log /var/log/squid/access.log squid

# ===================================================================
# END OF CONFIGURATION
# ===================================================================
