# ===================================================================
# Squid Proxy Server - Enterprise Configuration Template
# Target Location: /etc/squid/squid.conf
# Features: Access Control, Safe Ports, SSL Bump (Optional Bypass),
#           Domain Blocklists, Performance Tuning.
# ===================================================================

# -------------------------------------------------------------------
# NETWORK PARAMETERS
# -------------------------------------------------------------------
# Standard explicit proxy port
http_port 3128

# -------------------------------------------------------------------
# PERFORMANCE & CACHE TUNING
# -------------------------------------------------------------------
# Amount of RAM to use for hot objects (Suggested: 1/4 of system RAM)
cache_mem 256 MB
maximum_object_size_in_memory 512 KB

# Disk cache settings (UFS, 2GB, 16 L1 dirs, 256 L2 dirs)
cache_dir ufs /var/spool/squid 2000 16 256
maximum_object_size 100 MB

# DNS nameserver (Use internal or stable public DNS)
dns_nameservers 8.8.8.8 1.1.1.1

# -------------------------------------------------------------------
# ACCESS CONTROL LISTS (ACL)
# -------------------------------------------------------------------
# Define internal networks
acl localnet src 10.0.0.0/8       # RFC1918 internal network
acl localnet src 172.16.0.0/12    # RFC1918 internal network
acl localnet src 192.168.0.0/16   # RFC1918 internal network
acl localhost src 127.0.0.1/32

# Define safe ports
acl SSL_ports port 443
acl Safe_ports port 80            # http
acl Safe_ports port 21            # ftp
acl Safe_ports port 443           # https
acl Safe_ports port 70            # gopher
acl Safe_ports port 210           # wais
acl Safe_ports port 1025-65535    # unregistered ports
acl Safe_ports port 280           # http-mgmt
acl Safe_ports port 488           # gss-http
acl Safe_ports port 591           # filemaker
acl Safe_ports port 777           # multiling http

# Blocklists
acl blocked_sites dstdomain "/etc/squid/blocked_sites.txt"
acl blocked_files urlpath_regex -i \.exe$ \.msi$ \.bat$ \.scr$ \.iso$

# -------------------------------------------------------------------
# HTTP ACCESS RULES
# -------------------------------------------------------------------
# 1. Deny requests to unsafe ports
http_access deny !Safe_ports

# 2. Deny CONNECT to other than secure SSL ports
http_access deny CONNECT !SSL_ports

# 3. Only allow cachemgr access from localhost
http_access allow localhost manager
http_access deny manager

# 4. Apply Blocklists
http_access deny blocked_sites
http_access deny blocked_files

# 5. Allow access from your local networks
http_access allow localnet
http_access allow localhost

# 6. Finally deny all other access to this proxy
http_access deny all

# -------------------------------------------------------------------
# LOGGING & CORE DUMP
# -------------------------------------------------------------------
# Leave coredumps in the first cache dir
coredump_dir /var/spool/squid

# Log formats and paths (Standard)
access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log

# -------------------------------------------------------------------
# ADVANCED MODULES (Optional)
# -------------------------------------------------------------------
# To enable SSL Bump or ICAP, see:
# configs/squid/squid_ssl_bump.conf
# configs/squid/bandwidth_limit.conf

# ===================================================================
# END OF CONFIGURATION
# ===================================================================
