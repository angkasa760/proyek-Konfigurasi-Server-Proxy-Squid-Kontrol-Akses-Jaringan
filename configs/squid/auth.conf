# ===================================================================
# auth.conf - Basic NCSA Authentication Template for Squid
# Location: /etc/squid/auth.conf
# ===================================================================

# --- PRE-REQUISITE ---
# Build the password file first:
# sudo touch /etc/squid/passwd
# sudo chown squid:squid /etc/squid/passwd
# sudo htpasswd -b /etc/squid/passwd your_username your_password

# --- CONFIGURATION ---

# 1. Define the authentication program (NCSA helper)
auth_param basic program /usr/lib64/squid/basic_ncsa_auth /etc/squid/passwd

# 2. Number of authentication processes to spawn
auth_param basic children 5

# 3. Text to display in the login prompt
auth_param basic realm Squid Proxy SWG - Enterprise Access

# 4. How long the login is valid before needing re-auth
auth_param basic credentialsttl 2 hours

# 5. Case sensitivity
auth_param basic casesensitive off

# --- ACCESS CONTROL ---

# Rule: Require authentication for all proxy usage
# acl authenticated_users proxy_auth REQUIRED
# http_access allow authenticated_users

# ===================================================================
