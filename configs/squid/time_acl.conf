# ===================================================================
# time_acl.conf - Kontrol Akses Berbasis Waktu
# Lokasi: Merge ke /etc/squid/squid.conf
# ===================================================================

# -------------------------------------------------------------------
# DEFINISI WAKTU (time ACL)
# -------------------------------------------------------------------
# Format: acl <nama> time [hari] [HH:MM-HH:MM]
# Hari: M=Senin, T=Selasa, W=Rabu, H=Kamis, F=Jumat, A=Sabtu, S=Minggu

# Jam kerja: Senin-Jumat 08:00 - 17:00
acl jam_kerja time MTWHF 08:00-17:00

# Jam istirahat: Senin-Jumat 12:00 - 13:00
acl jam_istirahat time MTWHF 12:00-13:00

# Akhir pekan: Sabtu & Minggu (seharian)
acl weekend time AS 00:00-23:59

# Jam malam: setelah jam 22:00
acl jam_malam time MTWHFAS 22:00-23:59

# Jam belajar (contoh untuk lab sekolah): 07:00-15:00
acl jam_belajar time MTWHF 07:00-15:00

# -------------------------------------------------------------------
# DAFTAR SITUS YANG DIBLOKIR PADA JAM KERJA
# -------------------------------------------------------------------
# Buat file ini berisi domain: youtube.com, tiktok.com, dll
# acl social_media dstdomain "/etc/squid/social_media.txt"

# Contoh inline:
acl social_media dstdomain .youtube.com .tiktok.com .instagram.com .facebook.com .twitter.com .x.com

acl streaming dstdomain .netflix.com .disneyplus.com .primevideo.com .vidio.com .indihome.co.id

# -------------------------------------------------------------------
# ATURAN AKSES BERBASIS WAKTU
# -------------------------------------------------------------------

# 1. Blokir sosial media saat jam kerja (kecuali jam istirahat)
http_access deny social_media jam_kerja !jam_istirahat

# 2. Blokir streaming saat jam kerja
http_access deny streaming jam_kerja

# 3. Izinkan semua saat weekend
# http_access allow all weekend

# 4. Blokir semua akses di jam malam (contoh: lab sekolah)
# http_access deny all jam_malam

# -------------------------------------------------------------------
# CATATAN
# -------------------------------------------------------------------
# - Letakkan aturan ini SEBELUM "http_access allow localnet"
# - Urutan aturan sangat penting di Squid
# - Contoh penempatan di squid.conf:
#
#   http_access deny !Safe_ports
#   http_access deny blocked_sites
#   ## ----- MASUKKAN RULES WAKTU DI SINI -----
#   http_access deny social_media jam_kerja !jam_istirahat
#   http_access deny streaming jam_kerja
#   ## ----- AKHIR RULES WAKTU -----
#   http_access allow localnet
#   http_access deny all
# ===================================================================
