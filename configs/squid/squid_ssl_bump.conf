# ===================================================================
# squid_ssl_bump.conf - Konfigurasi Khusus SSL Interception (SSL Bump)
# Target: /etc/squid/squid.conf (merge atau replace)
# Prasyarat: CA sudah dibuat via scripts/create_ca.sh
# ===================================================================

# -------------------------------------------------------------------
# PORT LISTENER
# -------------------------------------------------------------------
# Explicit HTTP proxy
http_port 3128

# SSL Bump listener — decrypt & inspect HTTPS traffic
http_port 3129 ssl-bump \
    cert=/etc/squid/ssl_cert/myCA.pem \
    key=/etc/squid/ssl_cert/myCA.key \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=4MB

# -------------------------------------------------------------------
# SSL CERTIFICATE GENERATOR (ssl_crtd)
# -------------------------------------------------------------------
# Path bisa berbeda tergantung distro:
#   CentOS 7   : /usr/lib64/squid/ssl_crtd
#   Ubuntu/Deb : /usr/lib/squid/ssl_crtd
#   Squid 5+   : /usr/lib64/squid/security_file_certgen
sslcrtd_program /usr/lib64/squid/ssl_crtd -s /var/lib/ssl_db -M 4MB
sslcrtd_children 8 startup=1 idle=1

# -------------------------------------------------------------------
# SSL BUMP POLICY
# -------------------------------------------------------------------
# Whitelist: domain yang TIDAK di-intercept (splice/bypass)
acl no_bump dstdomain "/etc/squid/whitelist.txt"

# Step-based bump policy
acl step1 at_step SslBump1

# Peek dulu untuk lihat SNI, lalu splice domain di whitelist
ssl_bump peek step1
ssl_bump splice no_bump
ssl_bump bump all

# -------------------------------------------------------------------
# ACL JARINGAN
# -------------------------------------------------------------------
acl localnet src 172.24.0.0/16
acl localnet src 10.0.0.0/8
acl localnet src 192.168.0.0/16
acl localhost src 127.0.0.1/32

acl SSL_ports port 443
acl Safe_ports port 80 21 443 70 210 1025-65535

# -------------------------------------------------------------------
# BLOCKLIST
# -------------------------------------------------------------------
acl blocked_sites dstdomain "/etc/squid/blocked_sites.txt"
acl blocked_files urlpath_regex -i \.exe$ \.msi$ \.bat$ \.scr$ \.iso$ \.rar$ \.zip$

# -------------------------------------------------------------------
# ATURAN AKSES
# -------------------------------------------------------------------
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access deny blocked_sites
http_access deny blocked_files
http_access allow localnet
http_access allow localhost
http_access deny all

# -------------------------------------------------------------------
# LOGGING
# -------------------------------------------------------------------
access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log
forwarded_for off

# -------------------------------------------------------------------
# CATATAN SETUP
# -------------------------------------------------------------------
# 1. Generate CA:     sudo ./scripts/create_ca.sh
# 2. Init SSL DB:     sudo /usr/lib64/squid/ssl_crtd -c -s /var/lib/ssl_db
# 3. Set permission:  sudo chown -R squid:squid /var/lib/ssl_db /etc/squid/ssl_cert
# 4. Validasi config: sudo squid -k parse
# 5. Restart:         sudo systemctl restart squid
# ===================================================================
